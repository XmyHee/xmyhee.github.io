<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>QuestFrontiers | 求索映界</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
</head>
<body>

<nav class="global-nav">
    <div class="nav-inner">
        <div class="logo" onclick="scrollToTop()">
            <img src="logo.png">
            <span>QuestFrontiers | 求索映界</span>
        </div>
        <div class="nav-icons">
            <div class="nav-item"><span class="icon">◎</span><p>前沿疆域</p></div>
            <div class="nav-item"><span class="icon">◉</span><p>映照引擎</p></div>
            <div class="nav-item"><span class="icon">⬡</span><p>解决方案</p></div>
            <div class="explorer-toggle" onclick="toggleExplorerMode()">
                <span>探索者模式</span>
                <div class="toggle-switch"><div class="toggle-dot"></div></div>
            </div>
        </div>
    </div>
</nav>

<section class="hero">
    <div id="three-container"></div>
    <div class="energy-core"></div>
    <div class="hero-center">
        <h1>QuestFrontiers</h1>
        <p>探索智能 · 映照未来</p>
    </div>
</section>

<div id="node-panel">
    <h3 id="node-title"></h3>
    <p id="node-desc"></p>
    <button onclick="closePanel()" style="background:#5ff6ff; border:none; padding:5px 10px; cursor:pointer; margin-top:10px;">关闭</button>
</div>

<script src="script.js"></script>
</body>
</html>
