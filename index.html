<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuestFrontiers | 求索映界</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
</head>
<body>
    <header class="nav">
        <div class="nav-inner">
            <div class="logo">
                <!-- 图片 Logo + 文字（可选） -->
                <img src="https://cdn.jsdelivr.net/gh/Xmyhee/Xmyhee.github.io/logo.png" alt="QuestFrontiers Logo" class="logo-img">
                <span>求索映界</span>
            </div>
            <nav>
                <a href="#frontiers">前沿疆域</a>
                <a href="#engine">映照引擎</a>
                <a href="#solutions">解决方案</a>
            </nav>
        </div>
    </header>

    <section class="hero">
        <canvas id="stars"></canvas>
        <div id="three-container"></div>
        <div class="hero-content">
            <h1>求索无界<br>映照万象</h1>
            <p>融合 AI 前沿科技，为复杂工程与决策提供可量化、可信赖的技术映射</p>
            <a class="cta">进入疆域</a>
        </div>
    </section>

    <!-- 节点信息面板 -->
    <div id="nodePanel">
        <h3 id="nodeTitle"></h3>
        <p id="nodeDesc"></p>
        <button onclick="closePanel()">关闭</button>
    </div>

    <footer>QuestFrontiers © 2026</footer>

    <script src="script.js"></script>
</body>
</html>
