<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuestFrontiers | 求索映界</title>
    <link rel="preload" href="logo.png" as="image">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
</head>
<body>

<nav class="global-nav">
    <div class="nav-inner">
        <div class="logo" onclick="scrollToTop()">
            <img src="logo.png" class="logo-img" loading="eager" decoding="async">
            <span class="logo-text">QuestFrontiers | 求索映界</span>
        </div>
        <div class="nav-icons">
            <div class="nav-item"><span class="icon">◎</span><p>前沿疆域</p></div>
            <div class="nav-item"><span class="icon">◉</span><p>映照引擎</p></div>
            <div class="nav-item"><span class="icon">⬡</span><p>解决方案</p></div>
            <div class="explorer-toggle" onclick="toggleExplorerMode()">
                <span class="toggle-label">探索者模式</span>
                <div class="toggle-switch"><div class="toggle-dot"></div></div>
            </div>
        </div>
    </div>
</nav>

<section class="hero">
    <div id="three-container"></div>
    <div class="energy-core"></div>
    <div class="hero-center">
        <h1>QuestFrontiers</h1>
        <p>探索智能 · 映照万象</p>
    </div>
</section>

<div id="node-panel">
    <h3 id="node-title">AI Node</h3>
    <p id="node-desc">系统就绪</p>
    <button onclick="closePanel()">关闭</button>
</div>

<script src="script.js"></script>
</body>
</html>
