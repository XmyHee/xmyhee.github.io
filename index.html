<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuestFrontiers | 求索映界</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
</head>
<body>
<nav class="global-nav">
    <div class="nav-inner">
        <div class="logo" onclick="scrollToTop()">
            <img src="logo.png">
            <span class="logo-text">QuestFrontiers | 求索映界</span>
        </div>
        <div class="nav-icons">
            <div class="nav-item"><span class="icon">◎</span><p>疆域</p></div>
            <div class="nav-item"><span class="icon">◉</span><p>引擎</p></div>
            <div class="explorer-toggle" onclick="toggleExplorerMode()">
                <div class="toggle-switch"><div class="toggle-dot"></div></div>
            </div>
        </div>
    </div>
</nav>

<section class="hero">
    <div id="three-container"></div>
    <div class="energy-core"></div>
    <div class="hero-center">
        <h1>QuestFrontiers</h1>
        <p>探索智能 · 映照未来</p>
    </div>
</section>

<div id="node-panel">
    <h3 id="node-title"></h3>
    <p id="node-desc"></p>
    <button onclick="closePanel()">返回</button>
</div>

<script src="script.js"></script>
</body>
</html>
